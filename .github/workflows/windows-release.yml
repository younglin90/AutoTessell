name: Windows Release Build

on:
  push:
    tags:
      - 'v*' # v1.0.0 같은 태그가 푸시되면 빌드 시작
  workflow_dispatch: # 수동으로도 실행 가능

jobs:
  preflight:
    uses: ./.github/workflows/common-checks.yml

  build:
    needs: preflight
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r backend/requirements.txt

    - name: Build Python Backend (Server)
      run: |
        pyinstaller auto_tessell.spec --noconfirm

    - name: Set up Godot
      uses: chickensoft-games/setup-godot@v2
      with:
        version: 4.3.0 # Godot 버전

    - name: Export Godot GUI
      run: |
        mkdir dist\gui
        godot --headless --path godot/ --export-release "Windows Desktop" ..\dist\gui\auto-tessell-gui.exe

    - name: Install Inno Setup
      run: |
        # Inno Setup은 윈도우 러너에 기본 설치되어 있을 확률이 높습니다.
        # 만약 없으면 여기서 설치하는 로직을 넣습니다.

    - name: Build Installer (Inno Setup)
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts/installer.iss

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Tessell-Windows-Setup
        path: dist/Auto-Tessell-Setup.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Auto-Tessell-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
