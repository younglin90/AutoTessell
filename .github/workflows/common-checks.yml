name: Common Strict Checks

on:
  workflow_call:
    inputs:
      run_pytest:
        description: Run pytest suite
        required: false
        type: boolean
        default: false
      run_cli_smoke:
        description: Run CLI smoke tests
        required: false
        type: boolean
        default: false

jobs:
  strict-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ripgrep libgl1 libegl1 libxrender1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,volume,cad,netgen,desktop]"

      - name: Baseline checks
        run: |
          make checks-strict

      - name: Run tests
        if: ${{ inputs.run_pytest }}
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/ -v --tb=short -x -m "not requires_display"

      - name: Test CLI
        if: ${{ inputs.run_cli_smoke }}
        run: |
          auto-tessell --help
          auto-tessell analyze tests/benchmarks/sphere.stl
